<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1070" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="1070" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">ASM Transformation Service — Process Flow</text>

  <!-- LABORATORY box -->
  <rect x="30" y="50" width="640" height="130" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="70" text-anchor="middle" font-weight="bold" fill="#4a90d9">LABORATORY</text>

  <!-- Instrument box -->
  <rect x="60" y="85" width="140" height="70" rx="4" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
  <text x="130" y="113" text-anchor="middle" fill="#333">Instrument</text>
  <text x="130" y="129" text-anchor="middle" fill="#666" font-size="11">(e.g. Nova FLEX2)</text>

  <!-- Arrow instrument → output file -->
  <line x1="200" y1="120" x2="270" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output File box -->
  <rect x="270" y="85" width="160" height="70" rx="4" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
  <text x="350" y="113" text-anchor="middle" fill="#333">Output File</text>
  <text x="350" y="129" text-anchor="middle" fill="#666" font-size="11">(CSV, XML, TXT, JSON, XLSX)</text>

  <!-- Arrow output file down out of lab -->
  <line x1="350" y1="155" x2="350" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Config sources fork -->
  <!-- Left branch line from 350,200 to 130,200 -->
  <line x1="130" y1="200" x2="570" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="200" x2="130" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="200" x2="570" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Instrument Config (JSON) box -->
  <rect x="50" y="240" width="160" height="80" rx="4" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
  <text x="130" y="265" text-anchor="middle" font-weight="bold" fill="#333">Instrument Config</text>
  <text x="130" y="281" text-anchor="middle" fill="#666" font-size="11">(JSON file)</text>
  <text x="130" y="296" text-anchor="middle" fill="#666" font-size="11">vendor, model, serial#</text>

  <!-- Equipment Mgmt DB box -->
  <rect x="490" y="240" width="160" height="80" rx="4" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
  <text x="570" y="265" text-anchor="middle" font-weight="bold" fill="#333">Equipment Mgmt DB</text>
  <text x="570" y="281" text-anchor="middle" fill="#666" font-size="11">vendor, model, serial#</text>
  <text x="570" y="296" text-anchor="middle" fill="#666" font-size="11">(database record)</text>

  <!-- Merge arrows from both config sources to Step 1 -->
  <line x1="130" y1="320" x2="130" y2="360" stroke="#555" stroke-width="1.5"/>
  <line x1="570" y1="320" x2="570" y2="360" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="360" x2="570" y2="360" stroke="#555" stroke-width="1.5"/>
  <line x1="350" y1="360" x2="350" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="375" fill="#888" font-size="11">(config from file OR database)</text>

  <!-- STEP 1: UPLOAD -->
  <rect x="220" y="390" width="260" height="75" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="413" text-anchor="middle" font-weight="bold" fill="#155724">STEP 1: UPLOAD</text>
  <text x="350" y="431" text-anchor="middle" fill="#155724" font-size="11">User uploads instrument file</text>
  <text x="350" y="447" text-anchor="middle" fill="#155724" font-size="11">+ provides config via Dashboard or API</text>

  <line x1="350" y1="465" x2="350" y2="495" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 2: CONVERTER LOOKUP -->
  <rect x="220" y="495" width="260" height="75" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="518" text-anchor="middle" font-weight="bold" fill="#155724">STEP 2: CONVERTER LOOKUP</text>
  <text x="350" y="536" text-anchor="middle" fill="#155724" font-size="11">Reads instrument config</text>
  <text x="350" y="552" text-anchor="middle" fill="#155724" font-size="11">Looks up converter in Instrument Registry</text>

  <!-- Fork from Step 2 -->
  <line x1="350" y1="570" x2="350" y2="595" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="595" x2="540" y2="595" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="595" x2="160" y2="620" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="595" x2="540" y2="620" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Converter Found box -->
  <rect x="60" y="620" width="200" height="80" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="160" y="645" text-anchor="middle" font-weight="bold" fill="#856404">Converter Found</text>
  <text x="160" y="661" text-anchor="middle" fill="#856404" font-size="11">allotropy-based,</text>
  <text x="160" y="676" text-anchor="middle" fill="#856404" font-size="11">custom-built, or AI-generated</text>

  <!-- Not Found box -->
  <rect x="440" y="620" width="200" height="80" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="540" y="645" text-anchor="middle" font-weight="bold" fill="#721c24">Not Found</text>
  <text x="540" y="661" text-anchor="middle" fill="#721c24" font-size="11">Error message</text>
  <text x="540" y="676" text-anchor="middle" fill="#721c24" font-size="11">returned to user</text>

  <!-- Arrow from Found to ASM Output -->
  <line x1="160" y1="700" x2="160" y2="730" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="730" x2="350" y2="730" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ASM OUTPUT box -->
  <rect x="150" y="730" width="400" height="60" rx="6" fill="#cce5ff" stroke="#004085" stroke-width="1.5"/>
  <text x="350" y="756" text-anchor="middle" font-weight="bold" fill="#004085">ASM OUTPUT (JSON)</text>
  <text x="350" y="774" text-anchor="middle" fill="#004085" font-size="11">+ field_mapping (if converter supports it)</text>

  <line x1="350" y1="790" x2="350" y2="815" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 3: VALIDATION -->
  <rect x="220" y="815" width="260" height="70" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="838" text-anchor="middle" font-weight="bold" fill="#155724">STEP 3: VALIDATION (DVaaS)</text>
  <text x="350" y="856" text-anchor="middle" fill="#155724" font-size="11">Schema compliance • Required fields</text>
  <text x="350" y="872" text-anchor="middle" fill="#155724" font-size="11">Traceability check • PDF report</text>

  <line x1="350" y1="885" x2="350" y2="905" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 4: DATA INTEGRITY -->
  <rect x="220" y="905" width="260" height="70" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="928" text-anchor="middle" font-weight="bold" fill="#155724">STEP 4: DATA INTEGRITY</text>
  <text x="350" y="946" text-anchor="middle" fill="#155724" font-size="11">Source vs ASM • Field-by-field</text>
  <text x="350" y="962" text-anchor="middle" fill="#155724" font-size="11">100% match proof</text>

  <line x1="350" y1="975" x2="350" y2="993" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 5: RESULTS -->
  <rect x="220" y="993" width="260" height="60" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="1016" text-anchor="middle" font-weight="bold" fill="#155724">STEP 5: RESULTS</text>
  <text x="350" y="1034" text-anchor="middle" fill="#155724" font-size="11">ASM file • Validation report</text>
  <text x="350" y="1050" text-anchor="middle" fill="#155724" font-size="11">Integrity report • PDF attestation</text>
</svg>
