<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 820" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="640" height="820" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Converter Lifecycle — How a New Instrument Gets Supported</text>

  <!-- Step 1: Identify -->
  <rect x="120" y="45" width="400" height="70" rx="6" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="320" y="68" text-anchor="middle" font-weight="bold" fill="#3d1a78">1. IDENTIFY</text>
  <text x="320" y="86" text-anchor="middle" fill="#3d1a78" font-size="11">Customer has a new instrument not currently supported</text>
  <text x="320" y="102" text-anchor="middle" fill="#3d1a78" font-size="11">Check Instrument Registry to confirm it's not already there</text>

  <line x1="320" y1="115" x2="320" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: converter type -->
  <rect x="185" y="145" width="270" height="45" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="320" y="163" text-anchor="middle" font-weight="bold" fill="#856404">What type of converter?</text>
  <text x="320" y="181" text-anchor="middle" fill="#856404" font-size="11">Allotropy supported?  /  New format?</text>

  <!-- Fork -->
  <line x1="320" y1="190" x2="320" y2="210" stroke="#555" stroke-width="1.5"/>
  <line x1="150" y1="210" x2="490" y2="210" stroke="#555" stroke-width="1.5"/>
  <line x1="150" y1="210" x2="150" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="210" x2="490" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="150" y="228" text-anchor="middle" fill="#555" font-size="11">Allotropy supported</text>
  <text x="490" y="228" text-anchor="middle" fill="#555" font-size="11">Custom-built (new format)</text>

  <!-- Allotropy branch -->
  <rect x="50" y="240" width="200" height="70" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="150" y="263" text-anchor="middle" font-weight="bold" fill="#155724">Wrap allotropy parser</text>
  <text x="150" y="281" text-anchor="middle" fill="#155724" font-size="11">in a registry converter</text>
  <text x="150" y="297" text-anchor="middle" fill="#155724" font-size="11">(allotropy-based type)</text>

  <!-- Custom branch -->
  <rect x="380" y="240" width="210" height="70" rx="4" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="485" y="263" text-anchor="middle" font-weight="bold" fill="#3d1a78">2. BUILD CONVERTER</text>
  <text x="485" y="281" text-anchor="middle" fill="#3d1a78" font-size="11">Write manually or use</text>
  <text x="485" y="297" text-anchor="middle" fill="#3d1a78" font-size="11">AI Converter Generator</text>

  <!-- Merge -->
  <line x1="150" y1="310" x2="150" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="485" y1="310" x2="485" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="150" y1="340" x2="485" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="320" y1="340" x2="320" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Add to Converter Management -->
  <rect x="160" y="365" width="320" height="70" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="320" y="388" text-anchor="middle" font-weight="bold" fill="#155724">3. ADD TO CONVERTER MANAGEMENT</text>
  <text x="320" y="406" text-anchor="middle" fill="#155724" font-size="11">POST /register  •  Status: PENDING</text>
  <text x="320" y="422" text-anchor="middle" fill="#155724" font-size="11">Dashboard "Converter Management" tab</text>

  <line x1="320" y1="435" x2="320" y2="460" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Review & Approve -->
  <rect x="160" y="460" width="320" height="90" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="320" y="483" text-anchor="middle" font-weight="bold" fill="#155724">4. REVIEW &amp; APPROVE</text>
  <text x="320" y="501" text-anchor="middle" fill="#155724" font-size="11">Human reviews code • Tests with sample files</text>
  <text x="320" y="517" text-anchor="middle" fill="#155724" font-size="11">Validates ASM output • Checks field_mapping</text>
  <text x="320" y="533" text-anchor="middle" fill="#155724" font-size="11">POST /approve  •  Status: APPROVED</text>

  <line x1="320" y1="550" x2="320" y2="575" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Assign in Instrument Registry -->
  <rect x="160" y="575" width="320" height="70" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="320" y="598" text-anchor="middle" font-weight="bold" fill="#155724">5. ASSIGN IN INSTRUMENT REGISTRY</text>
  <text x="320" y="616" text-anchor="middle" fill="#155724" font-size="11">Link converter to vendor + model</text>
  <text x="320" y="632" text-anchor="middle" fill="#155724" font-size="11">Dashboard "Instrument Registry" tab</text>

  <line x1="320" y1="645" x2="320" y2="668" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Create Instrument Config -->
  <rect x="160" y="668" width="320" height="55" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="320" y="691" text-anchor="middle" font-weight="bold" fill="#155724">6. CREATE INSTRUMENT CONFIG</text>
  <text x="320" y="709" text-anchor="middle" fill="#155724" font-size="11">JSON file or record in equipment mgmt DB</text>

  <line x1="320" y1="723" x2="320" y2="743" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7: Available -->
  <rect x="160" y="743" width="320" height="55" rx="6" fill="#cce5ff" stroke="#004085" stroke-width="1.5"/>
  <text x="320" y="766" text-anchor="middle" font-weight="bold" fill="#004085">7. AVAILABLE</text>
  <text x="320" y="784" text-anchor="middle" fill="#004085" font-size="11">Registry lookup resolves this instrument</text>
  <text x="320" y="800" text-anchor="middle" fill="#004085" font-size="11">on every future conversion</text>
</svg>
